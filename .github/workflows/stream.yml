name: API Auto Stream

on:
  schedule:
    - cron: '0 14 * * *' # প্রতিদিন রাত ৮টা
  workflow_dispatch:

jobs:
  smart-stream:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # --- আপনার পুরাতন লজিক ---
    - name: Check Rotation (Whose Turn Is It?)
      id: check
      run: |
        # ================================
        # অ্যাকাউন্ট ভেদে নিচের সংখ্যাটি বদলাবেন:
        # ১ম অ্যাকাউন্ট (yusufadnan4854) -> MY_ID=0
        # ২য় অ্যাকাউন্ট (riyonislam?)   -> MY_ID=1
        # ৩য় অ্যাকাউন্ট                -> MY_ID=2
        # ================================
        MY_ID=2  
        
        # দিনের হিসাব
        DAY_NUM=$(($(date +%s) / 86400))
        REMAINDER=$(($DAY_NUM % 3))
        
        echo "Today: $REMAINDER, My ID: $MY_ID"

        if [ "$REMAINDER" -eq "$MY_ID" ]; then
          echo "✅ It is my turn!"
          echo "should_run=true" >> $GITHUB_OUTPUT
          
          # র‍্যান্ডম ডিউরেশন ক্যালকুলেশন
          R_TIME=$((RANDOM % 901))
          DUR=$((9900 + R_TIME))
          echo "duration=$DUR" >> $GITHUB_OUTPUT
        else
          echo "❌ Not my turn. Skipping."
          echo "should_run=false" >> $GITHUB_OUTPUT
        fi

    # --- পাইথন সেটআপ এবং স্ক্রিপ্ট রান ---
    - name: Set up Python
      if: steps.check.outputs.should_run == 'true'
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      if: steps.check.outputs.should_run == 'true'
      run: pip install -r requirements.txt

    # এই ধাপে API দিয়ে লাইভ তৈরি হবে এবং Key পাওয়া যাবে
    - name: Create Broadcast via API
      if: steps.check.outputs.should_run == 'true'
      id: api_setup
      env:
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      run: python autostream.py

    # --- ভিডিও এবং লাইভ ---
    - name: Install FFmpeg & Download Video
      if: steps.check.outputs.should_run == 'true'
      env:
        VIDEO_URL: ${{ secrets.VIDEO_URL }}
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg
        wget -O video.mp4 "$VIDEO_URL"

    - name: Start Streaming
      if: steps.check.outputs.should_run == 'true'
      timeout-minutes: 190
      env:
        # পাইথন স্ক্রিপ্ট থেকে জেনারেট হওয়া URL এবং Key এখানে আসছে
        RTMP_URL: ${{ steps.api_setup.outputs.server_url }}
        KEY: ${{ steps.api_setup.outputs.stream_key }}
        TIME: ${{ steps.check.outputs.duration }}
      run: |
        # প্লেলিস্ট তৈরি (শুরুর র‍্যান্ডম পয়েন্ট সহ লুপ)
        VID_LEN=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 video.mp4 | cut -d. -f1)
        MAX_START=$((VID_LEN - 10))
        R_START=$((RANDOM % MAX_START))
        
        echo "# Playlist" > list.txt
        echo "file 'video.mp4'" >> list.txt
        echo "inpoint $R_START" >> list.txt
        for i in {1..50}; do echo "file 'video.mp4'" >> list.txt; done

        # আসল স্ট্রিম কমান্ড
        ffmpeg -re -f concat -safe 0 -i list.txt -t $TIME -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 -f flv "$RTMP_URL/$KEY"
